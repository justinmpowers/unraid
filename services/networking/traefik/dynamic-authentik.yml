# Authentik forwardAuth middleware for Traefik
#
# Merge this block into your existing dynamic.yml on the Traefik host:
#   ${APPDATA_PATH}/traefik/dynamic.yml
#
# Prerequisites (Authentik UI):
#   1. Applications → Providers → Create a "Proxy Provider" per app
#      Mode: "Forward auth (single application)" or "Forward auth (domain level)"
#      External host: https://<app>.yourdomain.com
#   2. Applications → Applications → Create Application, assign the provider
#   3. The embedded outpost picks up new providers automatically (no restart needed)

http:
  middlewares:
    authentik:
      forwardAuth:
        address: "http://authentik:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
