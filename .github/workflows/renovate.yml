name: Renovate

on:
  schedule:
    - cron: '0 9 * * SUN'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: [self-hosted, unraid, docker-compose, automation]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.19
        env:
          LOG_LEVEL: debug
          RENOVATE_LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_HOST_RULES: >-
            [{"hostType":"docker","matchHost":"docker.io","username":"${{ secrets.DOCKER_HUB_USERNAME }}","password":"${{ secrets.DOCKER_HUB_PASSWORD }}"}]
        with:
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GH_TOKEN || github.token }}
