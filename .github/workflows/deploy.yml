name: Deploy to Unraid

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target_stack:
        description: 'Stack name to deploy (e.g., utilities-dashy). Omit to deploy all changed stacks.'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Show what would deploy without doing it'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed stacks
        id: detect
        run: |
          # Stack naming: services/<category>/<name>/docker-compose.yml → <category>-<name>
          to_stack() {
            echo "$1" | sed 's|services/||; s|/docker-compose\.yml||; s|/|-|'
          }
          SKIP="automation-github-runner"

          if [ -n "${{ inputs.target_stack }}" ]; then
            echo "${{ inputs.target_stack }}" > stacks.txt
          else
            git diff --name-only HEAD~1 HEAD \
              | grep '^services/.*/docker-compose\.yml$' > /tmp/changed.txt || true

            > stacks.txt
            while IFS= read -r f; do
              stack=$(to_stack "$f")
              echo "$SKIP" | grep -qw "$stack" || echo "$stack" >> stacks.txt
            done < /tmp/changed.txt
          fi

          count=$(wc -l < stacks.txt | tr -d ' ')
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Stacks to deploy: $count"
          [ -s stacks.txt ] && cat stacks.txt || echo "(none)"

      - name: Deploy stacks
        if: steps.detect.outputs.count > 0
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
        run: |
          DRY_RUN="${{ inputs.dry_run }}"

          # Infrastructure deploys first in this order
          INFRA_ORDER="infrastructure-redis networking-cloudflared security-authentik monitoring-prometheus monitoring-loki"

          deploy_stack() {
            local stack="$1"

            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] would deploy: $stack"
              return 0
            fi

            local id
            id=$(curl -sf -H "X-API-Key: $PORTAINER_API_KEY" \
              "$PORTAINER_URL/api/stacks" \
              | jq -r ".[] | select(.Name == \"$stack\") | .Id // empty")

            if [ -z "$id" ]; then
              echo "⚠️  $stack — not found in Portainer (create the Git stack first)"
              return 1
            fi

            curl -sf -X POST \
              -H "X-API-Key: $PORTAINER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"pullImage": true}' \
              "$PORTAINER_URL/api/stacks/$id/git/redeploy" > /dev/null \
              && echo "✅ $stack" \
              || { echo "❌ $stack failed"; return 1; }
          }

          # Infra stacks first
          for infra in $INFRA_ORDER; do
            grep -qx "$infra" stacks.txt && { deploy_stack "$infra" && sleep 5; } || true
          done

          # App stacks
          while IFS= read -r stack; do
            echo "$INFRA_ORDER" | grep -qw "$stack" && continue
            deploy_stack "$stack"
            sleep 2
          done < stacks.txt

      - name: Prune unused Docker resources
        if: always()
        run: |
          docker container prune -f
          docker image prune -f --filter "until=24h"
          docker network prune -f
          echo "Running containers: $(docker ps -q | wc -l)"
