name: Build Obico Images

on:
  schedule:
    - cron: '0 5 * * 1'  # Mondays at 5 AM UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if SHA already exists'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      sha: ${{ steps.upstream.outputs.sha }}
      tag: ${{ steps.upstream.outputs.tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Get upstream commit SHA
        id: upstream
        run: |
          SHA=$(git ls-remote https://github.com/TheSpaghettiDetective/obico-server.git refs/heads/release | cut -f1 | cut -c1-7)
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "tag=$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if this SHA was already built
        id: check
        run: |
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Force rebuild requested."
          elif docker manifest inspect ghcr.io/${{ github.repository_owner }}/obico-web:${{ steps.upstream.outputs.sha }} > /dev/null 2>&1; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Image for ${{ steps.upstream.outputs.sha }} already exists, skipping build."
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "New upstream commit ${{ steps.upstream.outputs.sha }}, will build."
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone Obico server (release branch)
        run: git clone --depth 1 -b release https://github.com/TheSpaghettiDetective/obico-server.git

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'yarn'
          cache-dependency-path: obico-server/frontend/yarn.lock

      - name: Build frontend
        working-directory: obico-server/frontend
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Prepare build context
        run: |
          cp -r ./obico-server/frontend ./obico-server/backend/frontend
          echo "COPY ./frontend /frontend" >> ./obico-server/backend/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./obico-server/backend
          file: ./obico-server/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/obico-web:${{ needs.check.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/obico-web:${{ needs.check.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/obico-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ml_api image
        uses: docker/build-push-action@v6
        with:
          context: ./obico-server/ml_api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/obico-ml-api:${{ needs.check.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/obico-ml-api:${{ needs.check.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/obico-ml-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
